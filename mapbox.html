<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Access Ramp Types</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.14.0/mapbox-gl.js"></script>
    <link
      href="https://api.mapbox.com/mapbox-gl-js/v3.14.0/mapbox-gl.css"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
      }

      h2,
      h3 {
        margin: 10px;
        font-size: 18px;
      }

      h3 {
        font-size: 16px;
      }

      p {
        margin: 10px;
      }

      .map-overlay {
        position: absolute;
        bottom: 0;
        right: 0;
        background: #fff;
        margin-right: 20px;
        font-family: Arial, sans-serif;
        overflow: auto;
        border-radius: 3px;
      }

      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 100%;
      }

      #features {
        top: 0;
        height: 100px;
        margin-top: 20px;
        width: 250px;
      }

      #legend {
        padding: 10px;
        box-shadow: 0 1px 2px rgb(0 0 0 / 10%);
        line-height: 18px;
        height: 150px;
        margin-bottom: 40px;
        width: 100px;
      }

      .legend-key {
        display: inline-block;
        border-radius: 20%;
        width: 10px;
        height: 10px;
        margin-right: 5px;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div class="map-overlay" id="features">
      <h2>Access Ramp Types at Fishing and Boating Sites</h2>
      <div id="pd"><p>By Ella Goodwin</p></div>
    </div>
    <div class="map-overlay" id="legend"></div>

    <script>
      // define access token
      mapboxgl.accessToken = 'pk.eyJ1IjoiZWxsYWdvb2R3aW4iLCJhIjoiY21ubmh2cDdoMXZzejJwb2sxa2xla2dvciJ9.-cl8ouJ2U1-zPq8beY1WVA';

      // create map
      const map = new mapboxgl.Map({
        container: 'map', // container id
        style: 'mapbox://styles/ellagoodwin/cmorwk28e002r01ry22ta744f' // map style URL from Mapbox Studio
      });

      // wait for map to load before adjusting it
      map.on('load', () => {
        // make a pointer cursor
        map.getCanvas().style.cursor = 'default';

       
        const legend = document.getElementById('legend');

// Define your categories + icon images (must match your Mapbox icon names)
const layers = [
  { name: 'Concrete', icon: 'square' },
  { name: 'Cartop', icon: 'car' },
  { name: 'Gravel', icon: 'triangle' },
  { name: 'Other', icon: 'circle' }
];

layers.forEach(layer => {
  const item = document.createElement('div');
  
  const icon = document.createElement('img');
  icon.src = `https://cdn.jsdelivr.net/npm/@mapbox/maki/icons/${layer.icon}-15.svg`;
  icon.style.width = '20px';
  icon.style.height = '20px';
  icon.style.marginRight = '8px';
  
  const label = document.createElement('span');
  label.textContent = layer.name;

  item.appendChild(icon);
  item.appendChild(label);
  legend.appendChild(item);
});
});
    </script>
  </body>
</html>
